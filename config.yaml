llm:
  provider: deepseek        # deepseek / qwen / openai / claude
  model_name: deepseek-chat
  base_url: https://api.deepseek.com/v1
  temperature: 0.85
  max_tokens: 512

embedding:
  provider: local           # local（中文效果好）或 openai
  model_name: BAAI/bge-small-zh-v1.5   # 小模型，~130MB，中文语义准确
  # 使用 openai embedding 时的模型名
  openai_model: text-embedding-3-small

memory:
  short_term_window: 20         # 保留最近 N 轮对话
  long_term_top_k: 5            # 向量检索返回 top-K 片段
  core_check_interval: 3        # 每 N 轮让 LLM 检查一次是否有新核心记忆
  core_memory_path: data/core_memory.json
  chroma_dir: data/chroma_db

persona:
  profile_path: data/processed/persona.json
  # 在 analyze_persona.py 运行之前，使用手写的基础人设
  use_manual_fallback: false

sticker:
  library_path: data/processed/stickers
  index_path: data/processed/sticker_index.json
  send_probability: 0.3     # 有 30% 的概率附带表情包（模拟真实频率）

preprocessing:
  session_gap_minutes: 30   # 超过 N 分钟无消息则切分为新对话
  target_nickname: "CccJoyyy"   # 她的微信昵称
  your_nickname: "我"           # WeFlow 格式中你的消息 sender 字段
